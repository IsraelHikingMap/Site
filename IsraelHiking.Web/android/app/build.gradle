apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'

android {
    namespace = "com.mapeak"
    compileSdk = rootProject.ext.compileSdkVersion
    packagingOptions {
        exclude 'build-data.properties'
    }
    defaultConfig {
        applicationId "com.mapeak"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 921000
        versionName "9.21.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    kotlinOptions {
        // The Valhalla artifacts are built with a newer Kotlin metadata version
        // than this project's compiler; allow reading them (POC).
        freeCompilerArgs += ["-Xskip-metadata-version-check"]
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
    maven { url = uri("https://jitpack.io") }
}

dependencies {
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation "androidx.car.app:app:$androidxCarAppVersion"
    implementation "org.maplibre.gl:android-sdk:$maplibreSdkVersion"
    implementation "org.maplibre.gl:android-sdk-turf:$maplibreTurfVersion"
    implementation "com.squareup.okhttp3:okhttp:$okhttpVersion"
    implementation "com.github.mapeak-com:pmtiles-mobile:v0.3.2"
    implementation "com.github.mapeak-com:maplibre-contour-rs:v0.4.1"
    implementation "androidx.core:core-ktx:$androidxCoreKtxVersion"
    implementation "com.google.android.gms:play-services-location:$playServicesLocationVersion"
    // Valhalla offline routing POC (native engine + models for the request/response types)
    implementation "io.github.rallista:valhalla-mobile:0.5.1"
    implementation "io.github.rallista:valhalla-models:0.2.0"
    implementation "io.github.rallista:valhalla-models-config:0.2.0"
    implementation "com.stadiamaps:osrm-openapi:0.0.10"
    implementation "com.squareup.moshi:moshi-kotlin:1.15.1"
    // Untar downloaded Valhalla area extracts into a shared tile directory.
    implementation "org.apache.commons:commons-compress:1.27.1"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
