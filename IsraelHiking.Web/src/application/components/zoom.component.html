﻿<div class="side-control maplibregl-ctrl hidden md:block">
    <button mat-button class="p-0!" (click)="zoomIn()" matTooltip="{{resources.zoomIn}}" matTooltipPosition="right"
        analyticsOn="click" analyticsCategory="Zoom" analyticsLabel="Zoom-in"><i
            class="fa fa-lg icon-plus"></i></button>
    <button mat-button class="p-0!" (click)="zoomOut()" matTooltip="{{resources.zoomOut}}" matTooltipPosition="right"
        analyticsOn="click" analyticsCategory="Zoom" analyticsLabel="Zoom-out"><i
            class="fa fa-lg icon-minus"></i></button>
</div>
