<div [dir]="resources.direction">
  <div class="flex flex-row">
    <div class="w-1/2">
      <button mat-button class="w-full" (click)="addPointToRoute()" matTooltip="{{resources.addPointToRoute}}"
        matTooltipPosition="above" analyticsOn="click" analyticsCategory="Location"
        analyticsLabel="Convert location to point"><i class="fa icon-plus"></i></button>
    </div>
    <div class="w-1/2">
      <button mat-button class="w-full" type="button" (click)="toggleDistance()" [class.active]="distance$ | async"
        matTooltip="{{resources.measureDistanceFromCurrentLocation}}" matTooltipPosition="above" analyticsOn="click"
        analyticsCategory="Location" analyticsLabel="Measure distance"><i class="fa icon-measure"></i></button>
    </div>
  </div>
  <div class="flex flex-row">
    <div class="w-1/2">
      <button mat-button class="w-full" type="button" (click)="hideCoordinates = !hideCoordinates"
        [class.active]="!hideCoordinates" matTooltip="{{resources.showCoordinates}}" matTooltipPosition="above"
        analyticsOn="click" analyticsCategory="Location" analyticsLabel="Toggle coordinates"><i
          class="fa icon-globe"></i></button>
    </div>
    <div class="w-1/2">
      <button mat-button class="w-full" type="button" (click)="openAddSimplePointDialog()"
        matTooltip="{{resources.uploadPoint}}" matTooltipPosition="above" analyticsOn="click"
        analyticsCategory="Location" analyticsLabel="Open upload point dialog"><i
          class="fa icon-cloud-upload"></i></button>
    </div>
  </div>
  @if (canShareLocation()) {
  <div class="flex flex-row">
    <div class="w-full">
      <button mat-button class="w-full" type="button" (click)="shareMyLocation()" analyticsOn="click"
        analyticsCategory="Location" analyticsLabel="Share my location"><i class="fa icon-share-alt"></i>
        {{resources.shareLocation}}</button>
    </div>
  </div>
  }
  @if (!hideCoordinates) {
  <coordinates [latlng]="latlng()"></coordinates>
  }
</div>
