<div [dir]="resources.direction">
    <div mat-dialog-title>
        <div>{{resources.export}}</div>
        <button mat-icon-button aria-label="Close" type="button" mat-dialog-close tabindex="-1"><i class="fa icon-close"></i></button>
    </div>
    <div mat-dialog-content>
        @if (deviceProviders.length > 0) {
        <div class="flex flex-col my-1">
            <label class="ms-2 text-sm">{{resources.sendToDevice}}</label>
            @for (provider of deviceProviders; track provider.id) {
            <div class="flex flex-row">
                <button mat-button (click)="sendToDevice(provider.id)" mat-dialog-close analyticsOn="click"
                    analyticsCategory="Files" analyticsLabel="Send to device {{provider.id}}">
                    <i class="fa icon-share-alt"></i>
                    <span class="ms-2 text-sm" dir="ltr">{{provider.displayName}}</span>
                </button>
            </div>
            }
        </div>
        <mat-divider></mat-divider>
        }
        @for (format of formats; track format) {
        <div class="flex flex-row">
            <button mat-button (click)="saveAs(format)" mat-dialog-close analyticsOn="click" analyticsCategory="Files"
                analyticsLabel="Save as format {{format.label}}">
                <span class="text-sm" dir="ltr">{{format.label}}</span>
            </button>
        </div>
        }
    </div>
</div>
