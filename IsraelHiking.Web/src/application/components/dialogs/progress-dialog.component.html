<div [dir]="resources.direction">
  <div mat-dialog-content>
    <div class="flex flex-row">
      <mat-progress-bar [mode]="progressPersentage > 0 ? 'buffer' : 'determinate'"
        [value]="progressPersentage"></mat-progress-bar>
    </div>
    <div class="flex flex-row">
      <span class="text-sm">
        @if (progressPersentage > 0) {
        {{progressPersentage | number: '1.1-1' }}%
        }
        {{' ' + text}}
      </span>
    </div>
  </div>
  <div mat-dialog-actions>
    <div class="flex flex-row w-full">
      @if (isError) {
      <div class="flex-1">
        <button mat-raised-button class="w-full error-button" mat-dialog-close analyticsOn="click"
          analyticsCategory="Progress" analyticsLabel="Error progress dialog">{{resources.close}}</button>
      </div>
      }
      @if (isContinue) {
      <div class="flex-1">
        <button mat-flat-button class="w-full" (click)="continueAction()" analyticsOn="click"
          analyticsCategory="Progress" analyticsLabel="Continue progress dialog">{{resources.continue}}</button>
      </div>
      }
      <div class="w-1/4">
        <button mat-raised-button class="w-full" mat-dialog-close analyticsOn="click" analyticsCategory="Progress"
          analyticsLabel="Cancel progress dialog">{{resources.cancel}}</button>
      </div>
    </div>
  </div>
</div>
