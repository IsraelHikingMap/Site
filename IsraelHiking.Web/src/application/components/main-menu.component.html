@if (!isIFrame()) {
<button mat-button routerLink="/map" routerLinkActive="border-b-4! border-brand!" analyticsOn="click"
  analyticsCategory="Menu" analyticsLabel="Plan & Explore" class="max-md:hidden! text-white!">
  <i class="fa fa-lg icon-map-o mat-icon"></i>
  <span class="mx-1">{{resources.planAndExplore}}</span>
</button>
<button mat-button routerLink="/public-routes" routerLinkActive="border-b-4! border-brand!" analyticsOn="click"
  analyticsCategory="Menu" analyticsLabel="Find Routes" class="max-md:hidden! text-white!">
  <i class="fa fa-lg icon-recordings mat-icon"></i>
  <span class="mx-1">{{resources.findRoutes}}</span>
</button>
}
@if (!isIFrame() && !isLoggedIn()) {
<button mat-raised-button (click)="login()">{{resources.signIn}}</button>
}
<button mat-button [matMenuTriggerFor]="appMenu" analyticsOn="click" analyticsCategory="Menu"
  analyticsLabel="Toggle main menu" class="!h-[56px] text-white!">
  <span class="flex flex-row justify-center items-center">
    @if (isLoggedIn()) {
    @if (userInfo?.imageUrl) {
    <img [src]="userInfo.imageUrl" alt="" class="max-h-[48px] me-4 rounded-full" />
    } @else {
    <i class="fa icon-user-circle fa-lg me-4"></i>
    }
    }
    <i class="fa fa-lg icon-bars"></i>
  </span>
</button>
<mat-menu #appMenu="matMenu" xPosition="before">
  <div [dir]="resources.direction">
    @if (!isIFrame()) {
    <button mat-menu-item routerLink="/map" routerLinkActive="bg-[#528CFA40]! border-s-4! border-brand!"
      class="block md:hidden!" analyticsOn="click" analyticsCategory="Menu" analyticsLabel="Plan & Explore">
      <i class="fa fa-lg icon-map-o mat-icon"></i>
      <span class="mx-1">{{resources.planAndExplore}}</span>
    </button>
    <button mat-menu-item routerLink="/public-routes" routerLinkActive="bg-[#528CFA40]! border-s-4! border-brand!"
      class="block md:hidden!" analyticsOn="click" analyticsCategory="Menu" analyticsLabel="Find Routes">
      <i class="fa fa-lg icon-recordings mat-icon"></i>
      <span class="mx-1">{{resources.findRoutes}}</span>
    </button>
    <hr class="block md:hidden!" />
    }
    @if (isLoggedIn()) {
    <button mat-menu-item routerLink="/shares" routerLinkActive="bg-[#528CFA40]! border-s-4! border-brand!"
      analyticsOn="click" analyticsCategory="User Menu" analyticsLabel="User shares open">
      <span><i class="fa fa-lg icon-mixcloud"></i> {{resources.mySavesInTheCloud}}</span>
    </button>
    <button mat-menu-item routerLink="/traces" routerLinkActive="bg-[#528CFA40]! border-s-4! border-brand!"
      analyticsOn="click" analyticsCategory="User Menu" analyticsLabel="User traces open">
      <span><i class="fa fa-lg icon-recordings"></i> {{resources.myTraces}}</span>
    </button>
    @if (isPurchaseAvailable()) {
    <button mat-menu-item (click)="orderOfflineMaps()" analyticsOn="click" analyticsCategory="Menu"
      analyticsLabel="Order">
      <i class="text-green-600 fa fa-lg icon-dollar mat-icon"></i>
      <span class="mx-1 text-green-600">{{resources.purchaseSubscription}}</span>
    </button>
    }
    @if (isRenewAvailable()) {
    <button mat-menu-item (click)="orderOfflineMaps()" analyticsOn="click" analyticsCategory="Menu"
      analyticsLabel="Renew">
      <i class="text-green-600 fa fa-lg icon-dollar mat-icon"></i>
      <span class="text-green-600 mx-1">{{resources.renewSubscription}}</span>
    </button>
    }
    @if (isOfflineDownloadAvailable()) {
    <button mat-menu-item routerLink="/offline-management" routerLinkActive="bg-[#528CFA40]! border-s-4! border-brand!"
      analyticsOn="click" analyticsCategory="User Menu" analyticsLabel="Download">
      <i class="fa fa-lg icon-download mat-icon"></i>
      <span class="mx-1">{{resources.downloadMapForOfflineUse}}</span>
    </button>
    }
    <button mat-menu-item (click)="logout()" analyticsOn="click" analyticsCategory="User Menu" analyticsLabel="Logout">
      <span><i class="fa fa-lg icon-sign-out"></i> {{resources.logout}}</span>
    </button>
    <hr />
    }
    <button mat-menu-item (click)="openConfigurationDialog()" analyticsOn="click" analyticsCategory="User Menu"
      analyticsLabel="Settings open">
      <span><i class="fa fa-lg icon-cogs"></i> {{resources.settings}}</span>
    </button>
    <button mat-menu-item (click)="openLanguage()" analyticsOn="click" analyticsCategory="Menu"
      analyticsLabel="Open language selection">
      <i class="fa fa-lg icon-language mat-icon"></i>
      <span class="mx-1">Language</span>
    </button>
    @if (!isIFrame()) {
    <button mat-menu-item routerLink="/about" routerLinkActive="bg-[#528CFA40]! border-s-4! border-brand!"
      analyticsOn="click" analyticsCategory="Menu" analyticsLabel="About">
      <i class="fa fa-lg icon-info mat-icon"></i>
      <span class="mx-1">{{resources.about}}</span>
    </button>
    <button mat-menu-item (click)="reportAnIssue()" analyticsOn="click" analyticsCategory="Menu"
      analyticsLabel="Report an issue">
      <i class="fa fa-lg icon-envelope mat-icon"></i>
      <span class="mx-1">{{resources.reportAnIssue}}</span>
    </button>
    }
  </div>
</mat-menu>
