#    ports:
#      - "5000:5000"
#    volumes:
#      - ./IsraelHiking.Web/appsettings.json:/israelhiking/appsettings.json
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.8
    container_name: elasticsearch
    environment:
      - node.name=elasticsearch
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
    volumes:
      - esdata:/usr/share/elasticsearch/data:rw
    ports:
      - 9200:9200
      - 9300:9300
    restart: always
  valhalla:
    image: ghcr.io/valhalla/valhalla-scripted:latest
    container_name: valhalla
    # On first start the image downloads the OSM extract below and builds the routing tiles into
    # the named volume; later starts reuse them (set force_rebuild=True or run valhalla-update.sh
    # to refresh). The HTTP API (route, trace_route, ...) is served on port 8002.
    environment:
      - tile_urls=https://download.geofabrik.de/asia/israel-and-palestine-latest.osm.pbf
      - build_elevation=True
      - build_admins=True
      - build_time_zones=True
      - use_tiles_ignore_pbf=True
      - force_rebuild=False
      - server_threads=2
    volumes:
      - valhalladata:/custom_files
    ports:
      - 8002:8002
    restart: always
  gpsbabel:
    image: israelhikingmap/gpsbabelwebapi
    container_name: gpsbabel
    ports:
      - 11987:80
    restart: always
  translation:
    image: libretranslate/libretranslate
    container_name: translation
    volumes:
      - tldata:/home/libretranslate:rw
    ports:
      - 5432:5000
    restart: always
  user-data:
    image: ghcr.io/mapeak-com/user-data
    container_name: user-data
    ports:
      - 3000:3000
    restart: always
    environment:
      - ES_URL=http://elasticsearch:9200
      - IMGUR_CLIENT_ID=1234567890
    volumes:
      - ./partners.json:/app/partners.json
  nginx:
    image: nginxinc/nginx-unprivileged
    container_name: nginx
    ports:
      - "5001:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
    restart: unless-stopped
  tileserver-gl:
    image: "maptiler/tileserver-gl"
    build:
      context: https://github.com/maptiler/tileserver-gl.git#v5.6.0
    command:
      - --verbose
      - --config
      - tileserver-gl-config.json
    ports:
      - 11223:8080
    volumes:
      - ./tileserver-gl-config.json:/data/tileserver-gl-config.json:ro
volumes:
  esdata:
    driver: local
  valhalladata:
    driver: local
  tldata:
    driver: local